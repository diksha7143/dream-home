<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">LuxDecore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>



    <div id="homeCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="images1.jpg" class="d-block w-100" alt="Interior 1" height="400" width="200">
                <div class="carousel-caption d-none d-md-block">
                    <h1>Luxurious feel</h1>
                    <p>Make your house a dream home</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="images2.jpg" class="d-block w-100" alt="Interior 2" height="400" width="200">
            </div>
            <div class="carousel-item">
                <img src="images3.jpg" class="d-block w-100" alt="Interior 3" height="400" width="200">
            </div>
        </div>

        
        <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>


    <div class="container my-5">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card">
                    <img src="images5.jpg" class="card-img-top" alt="Painting" height="400" width="200">
                    <div class="card-body">
                        <h5 class="card-title">Painting</h5>
                        <p class="card-text">Modern Art</p>
                        <button class="btn btn-secondary" disabled>Buy</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="images6.jpg" class="card-img-top" alt="Wardrobe" height="400" width="200">
                    <div class="card-body">
                        <h5 class="card-title">Wardrobe</h5>
                        <p class="card-text">A Corner of art</p>
                        <button class="btn btn-secondary" disabled>Buy</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="images4.jpg" class="card-img-top" alt="Table" height="400" width="200">
                    <div class="card-body">
                        <h5 class="card-title">Table</h5>
                        <p class="card-text">Wall attached Table</p>
                        <button class="btn btn-secondary" disabled>Buy</button>
                    </div>
                </div>
            </div>


        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
